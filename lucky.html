<body>
    <script src="./assets/js/header.js"></script>

    <main class="lucky-page container">
        <div class="lucky__header fade-in-up">
            <h1 class="popular__title">🎰 오늘의 행운 문구 뽑기</h1>
            <p class="tests__desc">버튼을 눌러 나만의 특별한 행운 메시지를 확인해보세요!</p>
        </div>

        <!-- 뽑기 기계 UI 영역 -->
        <div class="machine-wrap fade-in-up" style="animation-delay: 0.1s;">
            <div class="machine">
                <!-- 상단 유리볼 -->
                <div class="machine__globe">
                    <!-- 뒷배경 가짜 캡슐들 (장식용) -->
                    <div class="machine__dummy-capsules">
                        <div class="dummy-capsule"
                            style="background:#ff758c; width:45px; height:45px; bottom:10px; left:40px; transform:rotate(20deg);">
                        </div>
                        <div class="dummy-capsule"
                            style="background:#8a2be2; width:50px; height:50px; bottom:25px; left:90px; transform:rotate(-15deg);">
                        </div>
                        <div class="dummy-capsule"
                            style="background:#ffd700; width:40px; height:40px; bottom:8px; left:160px; transform:rotate(40deg);">
                        </div>
                        <div class="dummy-capsule"
                            style="background:#00d2ff; width:48px; height:48px; bottom:30px; left:200px; transform:rotate(-30deg);">
                        </div>
                        <div class="dummy-capsule"
                            style="background:#ff9f43; width:40px; height:40px; bottom:60px; left:140px; transform:rotate(10deg);">
                        </div>
                    </div>
                </div>

                <!-- 하단 본체 -->
                <div class="machine__base">
                    <!-- 레버(손잡이) -->
                    <div class="machine__knob" id="machine-knob">
                        <div class="machine__knob-handle"></div>
                    </div>
                    <!-- 캡슐 나오는 구멍 -->
                    <div class="machine__hole"></div>
                </div>

                <!-- 떨어지는 진짜 캡슐 -->
                <div id="active-capsule" class="capsule" title="나를 클릭해서 열어보세요!">
                    <div class="capsule__top"></div>
                    <div class="capsule__bottom"></div>
                </div>
            </div>
        </div>

        <!-- 뽑기 버튼 -->
        <div class="lucky-actions fade-in-up" style="animation-delay: 0.2s; margin-top: 50px;">
            <button id="btn-draw" class="btn btn--primary btn--large"
                style="box-shadow: 0 8px 20px rgba(138,43,226,0.3);">행운 뽑기 시작 🕹️</button>
            <p id="capsule-guide" class="guide-text"
                style="display:none; margin-top:16px; color:var(--color-primary); font-weight:700;">👆 바닥에 떨어진 캡슐을 클릭해서
                열어보세요!</p>
        </div>

        <!-- 결과 출력 컨테이너 -->
        <div id="lucky-result" class="lucky-result">
            <h2 class="result-label">오늘 당신에게 도착한 편지 💌</h2>
            <p id="lucky-text" class="result-text"></p>
            <button id="btn-retry" class="btn btn--outline btn--large">다시 뽑기 🔄</button>
        </div>

    <div class="side-top-ads" aria-label="사이드 광고">
        <ins class="kakao_ad_area side-top-ad side-top-ad--left" style="display:none;"
