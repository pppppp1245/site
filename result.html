<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodPick - 당신의 결과는?</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://site-moodpick.netlify.app/result.html">
    <meta property="og:title" content="MoodPick - 당신의 결과는?">
    <meta property="og:description" content="MoodPick 테스트 결과를 확인하고 공유해보세요.">
    <meta property="og:image" content="https://site-moodpick.netlify.app/assets/images/icon/favicon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://site-moodpick.netlify.app/result.html">
    <meta name="twitter:title" content="MoodPick - 당신의 결과는?">
    <meta name="twitter:description" content="MoodPick 테스트 결과를 확인하고 공유해보세요.">
    <meta name="twitter:image" content="https://site-moodpick.netlify.app/assets/images/icon/favicon.png">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .result-page {
            background: var(--color-bg-base);
            min-height: 100vh;
            padding-top: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-panel {
            background: var(--color-bg-card);
            border-radius: 32px;
            padding: 48px 32px;
            box-shadow: var(--shadow-md);
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin: 20px;
            border: 1px solid var(--color-border);
        }

        .result-img {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--color-primary);
            margin-bottom: 24px;
            word-break: keep-all;
            letter-spacing: -0.02em;
        }

        .result-desc {
            font-size: 1.125rem;
            line-height: 1.6;
            color: var(--color-text-main);
            margin-bottom: 32px;
            background: var(--color-bg-base);
            padding: 28px 24px;
            border-radius: 20px;
            word-break: keep-all;
        }

        .result-recom {
            margin-bottom: 48px;
            font-weight: 700;
            color: var(--color-primary-dark);
            background: var(--color-primary-light);
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
        }

        .result-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        /* 버튼 아웃라인 커스텀 (common.css 에 없으므로 추가) */
        .btn--outline-point {
            border: 2px solid var(--color-primary);
            color: var(--color-primary);
            background: transparent;
        }

        .btn--outline-point:hover {
            background: var(--color-primary-light);
        }

        @media (max-width: 480px) {
            .result-actions {
                flex-direction: column;
            }

            .result-actions .btn {
                width: 100%;
            }
        }
    </style>
    <!-- 파비콘 추가 -->
    <link rel="icon" type="image/png" href="./assets/images/icon/favicon.png">
    <link rel="apple-touch-icon" href="./assets/images/icon/favicon.png">
</head>

<body>
    <script>window.HEADER_SCROLLED = true;</script>
    <script src="./assets/js/header.js"></script>

    <main class="result-page">
        <div class="result-panel fade-in-up">
            <p style="font-weight: 700; color: var(--color-text-muted); margin-bottom: 16px;">당신의 분석 결과는...</p>

            <div id="result-box">
                <!-- Javascript에서 이곳에 결과 내용을 렌더링합니다 -->
            </div>

            <div class="result-actions fade-in" style="animation-delay: 0.4s;">
                <button onclick="retryTest()" class="btn btn--outline-point btn--large">테스트 다시하기 🔄</button>
                <a href="index.html" class="btn btn--primary btn--large">메인 홈으로 가기 🏠</a>
            </div>
        </div>
    </main>

    <script src="./assets/js/result.js"></script>
</body>

</html>
