<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodPick - 문의하기</title>
    <meta name="description" content="MoodPick 서비스 문의, 제휴, 버그 제보를 위한 안내 페이지입니다.">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="icon" type="image/png" href="./assets/images/icon/favicon.png">
    <meta name="google-site-verification" content="vGftOXd1qfulSkcSWuh6J4PUF_i7B3RMf_k-6RygxGU" />
    <meta name="msvalidate.01" content="13E1941B63F118BF1E57B95D2C6B0FD9" />
    <meta name="naver-site-verification" content="6a91b8f6b5390cbe7cdae36b76475077e85081e8" />
</head>

<body>
    <script>window.HEADER_SCROLLED = true;</script>
    <script src="./assets/js/header.js"></script>

    <main class="policy-page">
        <section class="policy-card container">
            <h1 class="policy-title">문의하기</h1>
            <p class="policy-updated">MoodPick 서비스 관련 문의를 접수해 주세요.</p>

            <div class="policy-section">
                <h2>문의 접수 안내</h2>
                <p>
                    서비스 이용 중 불편사항, 오류 제보, 광고/제휴 문의는 아래 폼을 통해 접수해 주세요.
                    접수된 문의는 영업일 기준 1~3일 내 순차적으로 답변드립니다.
                </p>
            </div>

            <!-- 문의 폼 -->
            <div class="contact-form-wrapper">
                <form name="contact" method="POST" action="/success.html" netlify>
                    <div class="form-group">
                        <label for="name">성함 <span class="required">*</span></label>
                        <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required />
                    </div>

                    <div class="form-group">
                        <label for="email">이메일 주소 <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="이메일을 입력해주세요" required />
                    </div>

                    <div class="form-group">
                        <label for="phone">연락처 <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required />
                    </div>

                    <div class="form-group">
                        <label for="type">문의 유형 <span class="required">*</span></label>
                        <select id="type" name="type" required>
                            <option value="">문의 유형을 선택해주세요</option>
                            <option value="service">서비스 이용 문의</option>
                            <option value="partnership">제휴 및 협업</option>
                            <option value="bug">오류/버그 제보</option>
                            <option value="other">기타</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">문의 내용 <span class="required">*</span></label>
                        <textarea id="message" name="message" rows="6" placeholder="문의하실 내용을 상세히 입력해주세요" required></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="privacy-agree" required>
                            <span>개인정보처리방침에 동의합니다 <span class="required">*</span></span>
                        </label>
                    </div>

                    <div class="form-actions" style="margin-top: 32px;">
                        <button type="submit" class="btn btn--primary btn--large">문의 제출하기</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="./assets/js/footer.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
