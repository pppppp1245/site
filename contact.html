<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodPick - 문의하기</title>
    <meta name="description" content="MoodPick 서비스 문의, 제휴, 버그 제보를 위한 안내 페이지입니다.">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="icon" type="image/png" href="./assets/images/icon/favicon.png">
</head>

<body>
    <script>window.HEADER_SCROLLED = true;</script>
    <script src="./assets/js/header.js"></script>

    <main class="policy-page">
        <section class="policy-card container">
            <h1 class="policy-title">문의하기</h1>
            <p class="policy-updated">MoodPick 서비스 관련 문의 채널입니다.</p>

            <div class="policy-section">
                <h2>문의 접수 안내</h2>
                <p>
                    서비스 이용 중 불편사항, 오류 제보, 광고/제휴 문의는 아래 채널로 접수해 주세요.
                    접수된 문의는 영업일 기준 1~3일 내 순차적으로 답변드립니다.
                </p>
            </div>

            <div class="contact-grid">
                <div class="contact-item">
                    <strong>이메일</strong>
                    <p>support@moodpick.com</p>
                </div>
                <div class="contact-item">
                    <strong>제휴 문의</strong>
                    <p>biz@moodpick.com</p>
                </div>
                <div class="contact-item">
                    <strong>운영 시간</strong>
                    <p>평일 10:00 - 18:00</p>
                </div>
            </div>

            <div class="policy-section">
                <h2>문의 시 포함해 주세요</h2>
                <ul>
                    <li>이용한 페이지 주소(URL)</li>
                    <li>발생한 문제의 상세 내용</li>
                    <li>기기 및 브라우저 정보(가능한 경우)</li>
                </ul>
            </div>
        </section>
    </main>

    <script src="./assets/js/footer.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
