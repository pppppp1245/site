<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodPick - 문의하기</title>
    <meta name="description" content="MoodPick 서비스 문의, 제휴, 버그 제보를 위한 안내 페이지입니다.">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="./assets/css/common.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="icon" type="image/png" href="./assets/images/icon/favicon.png">
    <meta name="google-site-verification" content="vGftOXd1qfulSkcSWuh6J4PUF_i7B3RMf_k-6RygxGU" />
    <meta name="msvalidate.01" content="13E1941B63F118BF1E57B95D2C6B0FD9" />
    <meta name="naver-site-verification" content="6a91b8f6b5390cbe7cdae36b76475077e85081e8" />
</head>

<body>
    <script>window.HEADER_SCROLLED = true;</script>
    <script src="./assets/js/header.js"></script>

    <main class="policy-page">
        <section class="policy-card container">
            <h1 class="policy-title">문의하기</h1>
            <p class="policy-updated">MoodPick 서비스 관련 문의를 접수해 주세요.</p>

            <div class="policy-section">
                <h2>문의 접수 안내</h2>
                <p>
                    서비스 이용 중 불편사항, 오류 제보, 광고/제휴 문의는 아래 폼을 통해 접수해 주세요.
                    접수된 문의는 영업일 기준 1~3일 내 순차적으로 답변드립니다.
                </p>
            </div>

            <!-- 문의 폼 -->
            <div class="contact-form-wrapper">
                <form name="contact" method="POST" action="/success.html" netlify>
                    <div class="form-group">
                        <label>Name <input type="text" name="name" placeholder="성함을 입력해주세요" required /></label>
                    </div>
                    <div class="form-group">
                        <label>Email <input type="email" name="email" placeholder="이메일을 입력해주세요" required /></label>
                    </div>
                    <div class="form-actions" style="margin-top: 24px;">
                        <button type="submit" class="btn btn--primary btn--large">Send</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="./assets/js/footer.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
