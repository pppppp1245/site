<body>
    <script>window.HEADER_SCROLLED = true;</script>
    <script src="./assets/js/header.js"></script>

    <main class="game-page">
        <div class="game-panel fade-in-up">
            <div class="game-panel__header">
                <h1 id="game-title" class="game-title">미니게임 로딩 중...</h1>
            </div>

            <div id="game-container" class="game-container">
                <!-- 게임 캔버스/영역 생성 -->
            </div>

            <div class="game-actions">
                <button id="btn-start" class="btn btn--primary btn--large" style="width:100%;">게임 준비 중...</button>
            </div>
        </div>

        <!-- 게임 결과 모달 UI (초기엔 숨김) -->
        <div id="game-result-overlay" class="game-result-overlay hidden">
            <div class="game-result-card fade-in-up">
                <h2 class="game-result-title">🎉 결과</h2>

                <div id="game-result-content" class="game-result-content">
                    <!-- JS 에서 내용물을 삽입해줍니다 -->
                </div>

                <!-- 카카오톡 공유 제외, 깔끔한 2버튼 체제 -->
                <div class="game-result-actions">
                    <button id="btn-retry" class="result-btn result-btn--retry">🎮 다시 도전하기</button>
                    <button id="btn-home" class="result-btn result-btn--home">🏠 홈으로 가기</button>
                </div>
            </div>
        </div>
    <div class="side-top-ads" aria-label="사이드 광고">
        <ins class="kakao_ad_area side-top-ad side-top-ad--left" style="display:none;"
            data-ad-unit="DAN-xKOBhXO5Ytje4xoo"
            data-ad-width="300"
            data-ad-height="250"></ins>
        <ins class="kakao_ad_area side-top-ad side-top-ad--right" style="display:none;"

            data-ad-width="300"

    </main>

    <script src="./assets/js/footer.js"></script>

    <script src="./assets/js/game.js"></script>
    <script src="./assets/js/main.js"></script>
    <!-- 검색 엔진 최적화(SEO) 마무리를 위한 구조화된 데이터 (JSON-LD) 형태 추가 제안 추천 반영 -->
    <!-- 구글, 네이버 등 주요 검색 로봇에게 이 페이지가 '비디오 소프트웨어/게임 앱'임을 명확히 인지시킴 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MoodPick 미니 오락관 - 무궁화 꽃이 피었습니다 외 웹 캐주얼 종합 게임",
      "operatingSystem": "WebBrowser",
      "applicationCategory": "GameApplication",
      "genre": "Casual Web Browser Mini Games",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "KRW"
      },
      "description": "설치가 필요 없이 언제 어디서나 브라우저에서 바로 한 번의 터치로 무료로 즐기는 HTML5 스트레스 타파 캐주얼 미니 웹게임 종합 플랫폼 (클릭 액션 및 인지 시뮬레이터 포함). 빠른 타이밍 측정 스피드 한계 테스트 서바이벌 플레이 강력 추천.",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "12500"
      }
    }
    </script>
</body>
