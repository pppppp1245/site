<body>
    <script>window.HEADER_SCROLLED = true;</script>
    <script src="/assets/js/header.js"></script>

    <main class="policy-page">
        <section class="policy-card container">
            <p class="policy-eyebrow">Color</p>
            <h1 class="policy-title">무드 컬러 메모</h1>
            <p class="policy-updated">오늘의 기분에 가까운 색을 고르고, 한 줄만 남겨 보세요. 기록은 이 기기에만 쌓입니다.</p>

            <div class="tool-widget tool-widget--wide">
                <span class="tool-label">프리셋</span>
                <div class="mood-swatch-row" id="swatches" role="group" aria-label="색 프리셋"></div>
                <div class="color-input-row">
                    <input type="color" id="color-picker" value="#8a2be2" aria-label="색 선택">
                    <span id="hex-label" style="font-weight:700;font-variant-numeric:tabular-nums;">#8A2BE2</span>
                </div>
                <label class="tool-label" for="mood-note">한 줄 메모</label>
                <input type="text" id="mood-note" class="journal-field" maxlength="120" placeholder="예: 차분해지고 싶은 오후">
                <div class="tool-actions">
                    <button type="button" class="btn btn--primary btn--large" id="btn-add">기록 추가</button>
                </div>
                <span class="tool-label" style="margin-top:20px;">최근 기록 (최대 7개)</span>
                <ul id="log-list" style="list-style:none;padding:0;margin:0;"></ul>
                <p class="tool-note" role="note">
                    <a href="/tools/index.html">무드 도구 목록</a> · <a href="/about.html">서비스 소개</a>
                </p>
            </div>

            <div class="policy-section tool-faq-in-policy">
                <h2>활용</h2>
                <details>
                    <summary>색만 바꿔도 되나요?</summary>
                    <p>네. 메모 없이 색만 저장해도 됩니다. 나중에 보며 그날의 무드를 떠올리는 용도로 쓸 수 있습니다.</p>
                </details>
            </div>

            <p class="tool-related tool-related--in-card"><a href="/tools/index.html">← 무드 도구 목록</a></p>
        </section>
    </main>

    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
(function () {
    var KEY = 'moodpick_mood_color_log';
    var presets = ['#8a2be2', '#ff758c', '#38bdf8', '#34d399', '#fbbf24', '#94a3b8', '#1a1a24'];
    var row = document.getElementById('swatches');
    var picker = document.getElementById('color-picker');
    var hexLabel = document.getElementById('hex-label');
    var note = document.getElementById('mood-note');
    var list = document.getElementById('log-list');

    presets.forEach(function (hex) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'mood-swatch';
        b.style.background = hex;
        b.setAttribute('aria-label', '색 ' + hex);
        b.addEventListener('click', function () {
            picker.value = hex;
            updateHex();
            document.querySelectorAll('.mood-swatch').forEach(function (x) { x.classList.remove('is-picked'); });
            b.classList.add('is-picked');
        });
        row.appendChild(b);
    });

    function updateHex() {
        hexLabel.textContent = picker.value.toUpperCase();
    }
    picker.addEventListener('input', function () {
        document.querySelectorAll('.mood-swatch').forEach(function (x) { x.classList.remove('is-picked'); });
        updateHex();
    });
    updateHex();

    function load() {
        try {
            return JSON.parse(localStorage.getItem(KEY) || '[]');
        } catch (e) {
            return [];
        }
    }
    function save(arr) {
        try {
            localStorage.setItem(KEY, JSON.stringify(arr.slice(0, 7)));
        } catch (e) {}
    }

    function render() {
        var arr = load();
        list.innerHTML = '';
        arr.forEach(function (item) {
            var li = document.createElement('li');
            li.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--color-border);font-size:0.9rem;';
            var dot = document.createElement('span');
            dot.style.cssText = 'width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1px solid var(--color-border);background:' + item.c;
            var text = document.createElement('span');
            text.textContent = item.c.toUpperCase() + (item.t ? ' · ' + item.t : '');
            text.style.wordBreak = 'keep-all';
            li.appendChild(dot);
            li.appendChild(text);
            list.appendChild(li);
        });
    }

    document.getElementById('btn-add').addEventListener('click', function () {
        var arr = load();
        arr.unshift({ c: picker.value, t: note.value.trim() });
        save(arr);
        note.value = '';
        render();
    });

    render();
})();
    </script>
    <script src="//wcs.pstatic.net/wcslog.js"></script>
    <script>
        if (!window.wcs_add) window.wcs_add = {};
        window.wcs_add["wa"] = "1c927f4cd89e390";

    </script>
</body>
