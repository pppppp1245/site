    <main class="policy-page">
        <section class="policy-card container">
            <p class="policy-eyebrow">Checklist</p>
            <h1 class="policy-title">집중 체크리스트</h1>
            <p class="policy-updated">작업을 시작하기 전에 한 번씩 훑어보세요. 체크한 항목은 이 브라우저에 저장됩니다.</p>

            <div class="tool-widget tool-widget--wide">
                <ul class="checklist" id="checklist"></ul>
                <div class="tool-actions" style="margin-top:16px;">
                    <button type="button" class="btn btn--large" id="btn-all-on" style="border:1px solid var(--color-border);background:#fff;">모두 체크</button>
                    <button type="button" class="btn btn--large" id="btn-all-off" style="border:1px solid var(--color-border);background:#fff;">모두 해제</button>
                </div>
                <p class="tool-note" role="note">

                </p>
            </div>

            <div class="policy-section tool-faq-in-policy">

                <details>
                    <summary>항목을 바꿀 수 있나요?</summary>

        </section>

    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
(function () {
    var items = [
        '휴대폰 무음 또는 집중 모드',
        '불필요한 탭·알림 닫기',
        '물 한 잔 준비',
        '다음 할 일을 한 문장으로 적기',
        '의자·화면 높이 가볍게 조정',
        '주변 정리 1분',
        '집중 목표 시간 정하기'
    ];
    var KEY = 'moodpick_focus_check_v1';

    function loadState() {
        try {
            var raw = localStorage.getItem(KEY);
            if (raw) return JSON.parse(raw);
        } catch (e) {}
        return items.map(function () { return false; });
    }

    function saveState(arr) {
        try { localStorage.setItem(KEY, JSON.stringify(arr)); } catch (e) {}
    }

    var state = loadState();
    if (state.length !== items.length) {
        state = items.map(function () { return false; });
    }

    var ul = document.getElementById('checklist');

    function render() {
        ul.innerHTML = '';
        items.forEach(function (text, i) {
            var li = document.createElement('li');
            if (state[i]) li.classList.add('is-done');
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = 'ck-' + i;
            cb.checked = !!state[i];
            cb.addEventListener('change', function () {
                state[i] = cb.checked;
                li.classList.toggle('is-done', cb.checked);
                saveState(state);
            });
            var lab = document.createElement('label');
            lab.htmlFor = 'ck-' + i;
            lab.textContent = text;
            li.appendChild(cb);
            li.appendChild(lab);
            ul.appendChild(li);
        });
    }

    document.getElementById('btn-all-on').addEventListener('click', function () {
        state = items.map(function () { return true; });
        saveState(state);
        render();
    });
    document.getElementById('btn-all-off').addEventListener('click', function () {
        state = items.map(function () { return false; });
        saveState(state);
        render();
    });

    render();
})();
    </script>
