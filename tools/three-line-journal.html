    <main class="policy-page">
        <section class="policy-card container">
            <p class="policy-eyebrow">Journal</p>
            <h1 class="policy-title">하루 3행 저널</h1>
            <p class="policy-updated">길게 쓰지 않아도 됩니다. 오늘의 질문에 맞춰 세 줄만 남겨 보세요.</p>

            <div class="tool-widget tool-widget--wide">
                <p class="journal-prompt" id="journal-prompt"></p>
                <label class="tool-label" for="line1">첫째 줄</label>
                <textarea id="line1" class="journal-field" rows="2" maxlength="200" placeholder="한 문장으로"></textarea>
                <label class="tool-label" for="line2">둘째 줄</label>
                <textarea id="line2" class="journal-field" rows="2" maxlength="200"></textarea>
                <label class="tool-label" for="line3">셋째 줄</label>
                <textarea id="line3" class="journal-field" rows="2" maxlength="200"></textarea>
                <div class="tool-actions" style="margin-top:8px;">
                    <button type="button" class="btn btn--primary btn--large" id="btn-save">오늘 분 저장</button>
                    <button type="button" class="btn btn--large" id="btn-clear" style="border:1px solid var(--color-border);background:#fff;">비우기</button>
                </div>
                <p class="tool-note" role="note">
                    저장은 이 브라우저에만 남습니다. 다른 기기와 동기화되지 않습니다.
                    <a href="/privacy.html">개인정보처리방침</a> · <a href="/tools/index.html">도구 목록</a>

                    <summary>매일 같은 질문인가요?</summary>
                    <p>날짜를 기준으로 질문 카드가 바뀝니다. 같은 날에는 동일한 카드가 표시됩니다.</p>
                </details>
                <details>
                    <summary>이전에 쓴 내용을 보려면?</summary>
                    <p>같은 날 다시 방문하면 저장해 둔 세 줄이 불러와집니다. 과거 날짜 열람 기능은 추후 확장할 수 있습니다.</p>
                </details>

            <p class="tool-related tool-related--in-card"><a href="/tools/index.html">← 무드 도구 목록</a></p>
        </section>

    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/main.js"></script>
    <script>
(function () {
    var prompts = [
        '오늘 나를 한 단어로 표현하면?',
        '지금 기분을 색으로 말한다면?',
        '오늘 고마웠던 작은 일 한 가지는?',
        '내일 조금만 덜어내도 좋은 것은?',
        '오늘 나에게 건네고 싶은 짧은 문장은?',
        '지금 몸이 보내는 신호 한 가지는?',
        '오늘 집중하고 싶었던 한 가지는?',
        '최근 잘하고 있다고 느끼는 나의 모습은?',
        '오늘 저녁 나를 위한 작은 선물을 고른다면?',
        '지금 마음이 머무는 장소는 어디인가요?',
        '오늘 배운 것(아주 작은 것도) 한 가지는?',
        '누군가에게 해주고 싶은 칭찬 한 마디는?'
    ];
    function dayKey() {
        return new Date().toISOString().slice(0, 10);
    }
    function promptIndex() {
        var d = dayKey();
        var n = 0;
        for (var i = 0; i < d.length; i++) n += d.charCodeAt(i);
        return n % prompts.length;
    }
    document.getElementById('journal-prompt').textContent = '오늘의 카드 · ' + prompts[promptIndex()];

    var k = 'moodpick_journal_' + dayKey();
    var l1 = document.getElementById('line1');
    var l2 = document.getElementById('line2');
    var l3 = document.getElementById('line3');

    try {
        var raw = localStorage.getItem(k);
        if (raw) {
            var o = JSON.parse(raw);
            l1.value = o.a || '';
            l2.value = o.b || '';
            l3.value = o.c || '';
        }
    } catch (e) {}

    document.getElementById('btn-save').addEventListener('click', function () {
        try {
            localStorage.setItem(k, JSON.stringify({ a: l1.value, b: l2.value, c: l3.value }));
        } catch (e) {}
        var btn = document.getElementById('btn-save');
        var t = btn.textContent;
        btn.textContent = '저장됨';
        setTimeout(function () { btn.textContent = t; }, 1500);
    });

    document.getElementById('btn-clear').addEventListener('click', function () {
        l1.value = '';
        l2.value = '';
        l3.value = '';
    });
})();
    </script>
